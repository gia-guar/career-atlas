# Persisted datasets.
# Anything not declared here (e.g. adzuna_raw, jobspy_raw, *_normalized
# intermediates) defaults to an in-memory dataset.

# CV input (drop your CV here)
cv_raw_text:
  type: text.TextDataset
  filepath: data/01_raw/cv/cv.md

# LLM artefacts
cv_profile:
  type: json.JSONDataset
  filepath: data/02_intermediate/cv_profile.json

cv_derived_scraping_params:
  type: json.JSONDataset
  filepath: data/02_intermediate/cv_derived_scraping_params.json

# Post-merge intermediate
postings_normalized:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/postings_normalized.parquet
  save_args:
    index: false

# Cumulative store — same path for the existing-side (Seeded) and output-side
# (vanilla) entries, per the bootstrap-on-FileNotFoundError trick.
postings_cumulative_existing:
  type: career_atlas.datasets.SeededParquetDataset
  filepath: data/03_primary/job_postings.parquet

postings_cumulative:
  type: pandas.ParquetDataset
  filepath: data/03_primary/job_postings.parquet
  save_args:
    index: false

# Stage 3: per-posting skill cache (long-format, one row per skill/tool/req).
# Same dual-entry pattern as the cumulative postings store.
posting_skills_existing:
  type: career_atlas.datasets.SeededParquetDataset
  filepath: data/02_intermediate/posting_skills.parquet
  empty_columns: [posting_id, name, kind]

posting_skills:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/posting_skills.parquet
  save_args:
    index: false

# Stage 3: derived artifacts.
canonical_skill_map:
  type: json.JSONDataset
  filepath: data/02_intermediate/canonical_skill_map.json

skill_category_map:
  type: json.JSONDataset
  filepath: data/02_intermediate/skill_category_map.json

skill_map_data:
  type: json.JSONDataset
  filepath: data/02_intermediate/skill_map.json

skill_map_png:
  type: matplotlib.MatplotlibDataset
  filepath: data/08_reporting/skill_map.png
  save_args:
    facecolor: "#000000"
    dpi: 150

skill_map_nodes_csv:
  type: pandas.CSVDataset
  filepath: data/08_reporting/skill_map_nodes.csv
  save_args:
    index: false
