# Technical knobs for the scraping pipeline.
#
# This file intentionally contains NO queries, countries, or locations — all
# of those are derived from the user's CV by the `cv_extraction` pipeline
# and arrive via `cv_derived_scraping_params`. The settings below only
# control *how* the scrape runs once targets have been chosen.

scraping:
  adzuna:
    results_per_page: 50
    max_pages: 5
    max_days_old: 30
    requests_per_minute: 20    # Adzuna's hard ceiling is 25 — leave headroom.
  jobspy:
    sites:
      - linkedin
      - indeed
    results_wanted: 100
    hours_old: 720             # 30 days
